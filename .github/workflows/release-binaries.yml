name: Release standalone `avar` binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach binaries to (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Install
        working-directory: tools/avar-bin
        run: bun install --frozen-lockfile || bun install
      - name: Build all targets
        working-directory: tools/avar-bin
        run: bun run build
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd tools/avar-bin/out
          gh release upload "${{ steps.tag.outputs.tag }}" \
            avar-linux-x64 avar-linux-arm64 \
            avar-darwin-x64 avar-darwin-arm64 \
            avar-windows-x64.exe SHA256SUMS \
            --clobber
